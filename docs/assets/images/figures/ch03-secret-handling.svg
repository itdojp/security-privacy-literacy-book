<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title-ch03-secret-handling desc-ch03-secret-handling">
  <title id="title-ch03-secret-handling">秘密情報の安全な取扱い</title>
  <desc id="desc-ch03-secret-handling">秘密情報を棚卸しし、専用基盤へ保管して短命化し、利用時はログ・Issue・AIなどへの出力を防ぐ。露出疑いがあれば値を再掲せず、失効・再発行と影響範囲確認へ進む。</desc>
  <defs>
    <marker id="arrow-ch03-secret-handling" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#ffffff"/>
  <text x="40" y="40" fill="#0f172a" font-family="sans-serif" font-size="26" font-weight="700">秘密情報の安全な取扱い</text>
  <g font-family="sans-serif" text-anchor="middle">
    <rect x="45" y="155" width="155" height="80" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="122" y="187" fill="#0f172a" font-size="17">所在を</text><text x="122" y="212" fill="#0f172a" font-size="17">棚卸し</text>
    <rect x="260" y="155" width="170" height="80" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="345" y="187" fill="#0f172a" font-size="17">専用基盤で保管</text><text x="345" y="212" fill="#0f172a" font-size="17">短命化・最小権限</text>
    <rect x="490" y="155" width="190" height="80" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
    <text x="585" y="187" fill="#0f172a" font-size="17">必要時だけ利用</text><text x="585" y="212" fill="#0f172a" font-size="17">監査可能にする</text>
    <polygon points="800,140 910,195 800,250 690,195" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="800" y="188" fill="#0f172a" font-size="17">露出の</text><text x="800" y="212" fill="#0f172a" font-size="17">疑いはあるか</text>

    <rect x="490" y="345" width="190" height="95" rx="12" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
    <text x="585" y="375" fill="#881337" font-size="17" font-weight="700">失効・再発行</text>
    <text x="585" y="400" fill="#0f172a" font-size="16">影響範囲確認</text>
    <text x="585" y="423" fill="#0f172a" font-size="16">Runbook更新</text>

    <rect x="70" y="330" width="330" height="125" rx="12" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <text x="235" y="360" fill="#334155" font-size="17" font-weight="700">露出させない場所</text>
    <text x="235" y="390" fill="#0f172a" font-size="16">ログ・CI出力・Issue・PR</text>
    <text x="235" y="418" fill="#0f172a" font-size="16">チャット・AI・外部サービス</text>
    <text x="235" y="442" fill="#475569" font-size="14">値や復元可能な断片を載せない</text>
  </g>
  <g fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow-ch03-secret-handling)">
    <path d="M200 195 H260"/>
    <path d="M430 195 H490"/>
    <path d="M680 195 H690"/>
    <path d="M800 250 V295 H585 V345"/>
    <path d="M490 220 C430 255 390 300 350 330"/>
  </g>
  <g fill="#475569" font-family="sans-serif" font-size="15">
    <text x="732" y="285">ある / 不明</text>
    <text x="835" y="282">ない</text>
  </g>
  <path d="M910 195 H935 V105 H585 V155" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow-ch03-secret-handling)"/>
  <text x="755" y="92" fill="#166534" font-family="sans-serif" font-size="15">通常運用を継続</text>
  <text x="40" y="505" fill="#475569" font-family="sans-serif" font-size="16">露出疑いでは値を再掲せず、直ちに無効化して新しい認証情報へ切り替える。</text>
</svg>
